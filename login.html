<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - LAB ICT SMAN 1 Malang</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; }
        body {
            background: linear-gradient(145deg, #e8edf2, #d5dde6);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-box {
            background: white;
            padding: 40px 32px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 380px;
        }
        .login-box h1 { text-align: center; color: #1a2a3a; font-size: 1.5rem; }
        .login-box .subtitle { text-align: center; color: #6b7a8a; font-size: 0.85rem; margin-bottom: 28px; }
        .login-box .back-link { display: block; text-align: center; color: #2c7da0; text-decoration: none; font-size: 0.85rem; margin-top: 16px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-weight: 600; font-size: 0.85rem; color: #4a5a6a; margin-bottom: 4px; }
        .form-group input { width: 100%; padding: 12px 16px; border: 1.5px solid #dde4ec; border-radius: 12px; font-size: 1rem; }
        .form-group input:focus { outline: none; border-color: #2c7da0; }
        .btn { width: 100%; padding: 12px; background: #1a2a3a; color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; }
        .btn:hover { background: #2a3a4a; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .error { background: #ffebee; color: #c62828; padding: 10px 14px; border-radius: 8px; font-size: 0.85rem; margin-top: 12px; display: none; }
        .success { background: #e8f5e9; color: #2e7d32; padding: 10px 14px; border-radius: 8px; font-size: 0.85rem; margin-top: 12px; display: none; }
        .loading-text { text-align: center; color: #6b7a8a; font-size: 0.85rem; margin-top: 12px; display: none; }
        .info-note { text-align: center; color: #8a9aa8; font-size: 0.7rem; margin-top: 12px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>🔐 LAB ICT</h1>
        <div class="subtitle">SMAN 1 Malang · Login Admin</div>
        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Masukkan username" required autocomplete="off">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Masukkan password" required>
            </div>
            <button type="submit" class="btn" id="loginBtn">Login</button>
            <div id="loadingText" class="loading-text">⏳ Memeriksa data...</div>
            <div id="msgArea" class="error"></div>
            <a href="index.html" class="back-link">← Kembali ke Dashboard</a>
            <div class="info-note">* Gunakan akun yang terdaftar di database</div>
        </form>
    </div>

    <script>
        // ============================================================
        // KONFIGURASI - GANTI DENGAN URL APPS SCRIPT ANDA
        // ============================================================
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbywdB9e8cEJesRuDq1tPM3R_4GgVfhi4dvNE-F3HPKE4tfuCq7ltK25iCEkNmGStatmkA/exec";

        // ============================================================
        // JSONP HELPER (Built-in)
        // ============================================================
        function jsonpRequest(url, params = {}, timeout = 15000) {
            return new Promise((resolve, reject) => {
                const callbackName = 'jsonp_login_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
                const script = document.createElement('script');
                
                const timer = setTimeout(() => {
                    cleanup();
                    reject(new Error('Request timeout'));
                }, timeout);
                
                function cleanup() {
                    clearTimeout(timer);
                    delete window[callbackName];
                    if (script.parentNode) script.parentNode.removeChild(script);
                }
                
                window[callbackName] = function(data) {
                    cleanup();
                    resolve(data);
                };
                
                script.onerror = function() {
                    cleanup();
                    reject(new Error('Network error'));
                };
                
                const urlParams = new URLSearchParams(params);
                urlParams.append('callback', callbackName);
                urlParams.append('_t', Date.now());
                
                script.src = url + '?' + urlParams.toString();
                document.head.appendChild(script);
            });
        }

        // ============================================================
        // ELEMEN DOM
        // ============================================================
        const form = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const loadingText = document.getElementById('loadingText');
        const msgArea = document.getElementById('msgArea');

        // ============================================================
        // FUNGSI LOGIN - FETCH KE APPS SCRIPT
        // ============================================================
        async function handleLogin(e) {
            e.preventDefault();
            
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();
            
            // Validasi input
            if (!username || !password) {
                showMessage('Harap isi username dan password', 'error');
                return;
            }
            
            // Disable button & tampilkan loading
            loginBtn.disabled = true;
            loginBtn.textContent = '⏳ Memproses...';
            loadingText.style.display = 'block';
            msgArea.style.display = 'none';
            
            try {
                // Panggil API login
                const result = await jsonpRequest(SCRIPT_URL, {
                    action: 'login',
                    username: username,
                    password: password
                });
                
                // Cek response
                if (result.status === 'success' && result.data && result.data.valid === true) {
                    // Login sukses
                    const userData = {
                        name: result.data.user || username,
                        role: result.data.role || 'admin',
                        username: username
                    };
                    
                    // Simpan ke sessionStorage
                    sessionStorage.setItem('user', JSON.stringify(userData));
                    
                    // Tampilkan sukses
                    showMessage('✅ Login berhasil! Mengarahkan ke dashboard...', 'success');
                    
                    // Redirect ke dashboard.html setelah 1 detik
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                    
                } else {
                    // Login gagal
                    const errorMsg = result.message || 'Username atau password salah';
                    showMessage('❌ ' + errorMsg, 'error');
                }
                
            } catch (error) {
                console.error('Login error:', error);
                showMessage('❌ Gagal terhubung ke server: ' + error.message, 'error');
            } finally {
                // Enable button
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login';
                loadingText.style.display = 'none';
            }
        }

        // ============================================================
        // FUNGSI SHOW MESSAGE
        // ============================================================
        function showMessage(message, type = 'error') {
            msgArea.textContent = message;
            msgArea.className = type;
            msgArea.style.display = 'block';
            
            // Auto hide setelah 5 detik
            clearTimeout(window.msgTimeout);
            window.msgTimeout = setTimeout(() => {
                msgArea.style.display = 'none';
            }, 5000);
        }

        // ============================================================
        // EVENT LISTENER
        // ============================================================
        form.addEventListener('submit', handleLogin);

        // Enter key support
        passwordInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                form.dispatchEvent(new Event('submit'));
            }
        });

        usernameInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                passwordInput.focus();
            }
        });

        // ============================================================
        // CEK SESSION - Jika sudah login, redirect ke dashboard
        // ============================================================
        (function checkExistingSession() {
            const userData = sessionStorage.getItem('user');
            if (userData) {
                try {
                    const user = JSON.parse(userData);
                    // Jika sudah login, langsung redirect ke dashboard
                    window.location.href = 'dashboard.html';
                } catch (e) {
                    // Invalid session, hapus
                    sessionStorage.removeItem('user');
                }
            }
        })();

        console.log('🔐 Login page loaded. SCRIPT_URL:', SCRIPT_URL);
    </script>
</body>
</html>
