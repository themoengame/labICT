<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - LAB ICT SMAN 1 Malang</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; }
        body {
            background: linear-gradient(145deg, #e8edf2, #d5dde6);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-box {
            background: white;
            padding: 40px 32px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 380px;
        }
        .login-box h1 { text-align: center; color: #1a2a3a; font-size: 1.5rem; }
        .login-box .subtitle { text-align: center; color: #6b7a8a; font-size: 0.85rem; margin-bottom: 28px; }
        .login-box .back-link { display: block; text-align: center; color: #2c7da0; text-decoration: none; font-size: 0.85rem; margin-top: 16px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-weight: 600; font-size: 0.85rem; color: #4a5a6a; margin-bottom: 4px; }
        .form-group input { width: 100%; padding: 12px 16px; border: 1.5px solid #dde4ec; border-radius: 12px; font-size: 1rem; }
        .form-group input:focus { outline: none; border-color: #2c7da0; }
        .btn { width: 100%; padding: 12px; background: #1a2a3a; color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; }
        .btn:hover { background: #2a3a4a; }
        .error { background: #ffebee; color: #c62828; padding: 10px 14px; border-radius: 8px; font-size: 0.85rem; margin-top: 12px; display: none; }
        .success { background: #e8f5e9; color: #2e7d32; padding: 10px 14px; border-radius: 8px; font-size: 0.85rem; margin-top: 12px; display: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>🔐 LAB ICT</h1>
        <div class="subtitle">SMAN 1 Malang · Login Admin</div>
        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Masukkan username" required autocomplete="off">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Masukkan password" required>
            </div>
            <button type="submit" class="btn">Login</button>
            <div id="msgArea" class="error"></div>
            <a href="index.html" class="back-link">← Kembali ke Dashboard</a>
        </form>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxGoxq_XsXGifT4wWWvDbwnNmJUUbg4G9ag2rZGotjzwSpw0GjSuhr1dTcOnBUABAqM/exec";

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const msgArea = document.getElementById('msgArea');

            if (!username || !password) {
                msgArea.textContent = 'Harap isi username dan password';
                msgArea.className = 'error';
                msgArea.style.display = 'block';
                return;
            }

            try {
                // JSONP request
                const callbackName = 'jsonp_login_' + Date.now();
                const url = `${SCRIPT_URL}?action=login&username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}&callback=${callbackName}`;
                
                const response = await new Promise((resolve, reject) => {
                    const script = document.createElement('script');
                    window[callbackName] = function(data) {
                        resolve(data);
                        delete window[callbackName];
                        script.remove();
                    };
                    script.onerror = function() {
                        reject(new Error('Network error'));
                        delete window[callbackName];
                        script.remove();
                    };
                    script.src = url;
                    document.head.appendChild(script);
                });

                if (response.status === 'success' && response.data.valid) {
                    sessionStorage.setItem('user', JSON.stringify({ 
                        name: response.data.user, 
                        role: response.data.role 
                    }));
                    msgArea.textContent = '✅ Login berhasil! Mengarahkan...';
                    msgArea.className = 'success';
                    msgArea.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                } else {
                    msgArea.textContent = response.message || 'Username atau password salah';
                    msgArea.className = 'error';
                    msgArea.style.display = 'block';
                }
            } catch (error) {
                msgArea.textContent = 'Gagal menghubungi server: ' + error.message;
                msgArea.className = 'error';
                msgArea.style.display = 'block';
                console.error(error);
            }
        });
    </script>
</body>
</html>
