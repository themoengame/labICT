<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAB ICT · SMAN 1 Malang</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; }
        body { background: #eef2f5; min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* Header */
        .header {
            background: white;
            border-radius: 24px;
            padding: 20px 30px;
            margin-bottom: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .header h1 { font-size: 1.4rem; color: #1a2a3a; }
        .header h1 span { color: #2c7da0; }
        .header .right { display: flex; align-items: center; gap: 16px; }
        .btn-login { background: #1a2a3a; color: white; border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-weight: 600; }
        .btn-login:hover { background: #2a3a4a; }
        .user-badge { background: #e8f0fe; padding: 6px 16px; border-radius: 20px; font-size: 0.85rem; color: #1a2a3a; display: none; }
        .user-badge.show { display: inline-block; }
        
        /* Card */
        .card {
            background: white;
            border-radius: 24px;
            padding: 24px 28px;
            margin-bottom: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .card h2 { font-size: 1.2rem; color: #1a2a3a; margin-bottom: 16px; }
        .card h2 .badge { font-size: 0.7rem; background: #e74c3c; color: white; padding: 2px 10px; border-radius: 12px; margin-left: 8px; }
        
        /* Form */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .form-group { display: flex; flex-direction: column; gap: 4px; }
        .form-group label { font-weight: 600; color: #4a5a6a; font-size: 0.85rem; }
        .form-group label .required { color: #e74c3c; }
        .form-group input, .form-group select, .form-group textarea {
            padding: 10px 14px;
            border: 1.5px solid #dde4ec;
            border-radius: 12px;
            font-size: 0.95rem;
            width: 100%;
        }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #2c7da0; }
        .form-group textarea { resize: vertical; min-height: 60px; }
        .form-full { grid-column: 1 / -1; }
        
        .btn { padding: 10px 28px; border: none; border-radius: 20px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: #2c7da0; color: white; }
        .btn-primary:hover { background: #1a6a8a; transform: translateY(-1px); }
        .btn-success { background: #27ae60; color: white; }
        .btn-success:hover { background: #1e8449; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-danger:hover { background: #c0392b; }
        .btn-warning { background: #f39c12; color: white; }
        .btn-warning:hover { background: #d68910; }
        .btn-sm { padding: 4px 14px; font-size: 0.75rem; }
        .btn-secondary { background: #dde4ec; color: #4a5a6a; }
        .btn-secondary:hover { background: #c8d1db; }
        
        .form-actions { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
        
        /* Table */
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #eef2f5; }
        th { background: #f8fafc; font-weight: 600; color: #4a5a6a; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; }
        td { font-size: 0.9rem; }
        .text-center { text-align: center; }
        .text-muted { color: #8a9aa8; }
        
        .status-badge { padding: 3px 12px; border-radius: 12px; font-size: 0.7rem; font-weight: 600; display: inline-block; }
        .status-pending { background: #fff3e0; color: #e65100; }
        .status-approved { background: #e8f5e9; color: #2e7d32; }
        .status-rejected { background: #ffebee; color: #c62828; }
        .status-returned { background: #e3f2fd; color: #0d47a1; }
        
        .notification { padding: 12px 18px; border-radius: 12px; margin-bottom: 16px; display: none; }
        .notification.success { background: #e8f5e9; color: #2e7d32; display: block; }
        .notification.error { background: #ffebee; color: #c62828; display: block; }
        .notification.info { background: #e3f2fd; color: #0d47a1; display: block; }
        
        /* Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin-bottom: 16px; }
        .stat-item { background: #f8fafc; padding: 16px; border-radius: 16px; text-align: center; }
        .stat-item .number { font-size: 1.8rem; font-weight: 700; color: #1a2a3a; }
        .stat-item .label { font-size: 0.75rem; color: #6b7a8a; }
        
        /* Responsive */
        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .header { flex-direction: column; align-items: stretch; text-align: center; }
            .header .right { justify-content: center; }
        }
        
        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: white;
            border-radius: 24px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-box h2 { margin-bottom: 16px; }
        .modal-actions { display: flex; gap: 12px; margin-top: 16px; }
        
        /* Loading Modal */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .loading-overlay.active { display: flex; }
        .loading-box {
            background: white;
            border-radius: 24px;
            padding: 40px 50px;
            text-align: center;
            min-width: 280px;
        }
        .loading-spinner {
            border: 4px solid #eef2f5;
            border-top: 4px solid #2c7da0;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-box p { color: #4a5a6a; font-size: 0.95rem; }
        .loading-box .sub { color: #8a9aa8; font-size: 0.8rem; margin-top: 4px; }
        .loading-progress { margin-top: 12px; }
        .loading-progress .bar {
            height: 4px;
            background: #eef2f5;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 8px;
        }
        .loading-progress .bar .fill {
            height: 100%;
            background: #2c7da0;
            border-radius: 4px;
            width: 0%;
            transition: width 0.3s;
        }
    </style>
</head>
<body>

<!-- LOADING OVERLAY -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-box">
        <div class="loading-spinner"></div>
        <p id="loadingText">⏳ Memuat data...</p>
        <p class="sub" id="loadingSub">Mohon tunggu sebentar</p>
        <div class="loading-progress">
            <div class="bar"><div class="fill" id="loadingProgress"></div></div>
        </div>
    </div>
</div>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <h1>🏫 LAB <span>ICT</span> · SMAN 1 Malang</h1>
        <div class="right">
            <span class="user-badge" id="userBadge">👤 Admin</span>
            <button class="btn-login" id="loginBtn" onclick="window.location.href='login.html'">🔐 Login Admin</button>
            <button class="btn-login" id="logoutBtn" style="display:none; background:#e74c3c;" onclick="logout()">🚪 Logout</button>
        </div>
    </div>

    <!-- STATS -->
    <div class="stats-grid" id="statsContainer">
        <div class="stat-item"><div class="number" id="statRuang">-</div><div class="label">🏢 Ruang</div></div>
        <div class="stat-item"><div class="number" id="statInventaris">-</div><div class="label">📦 Inventaris</div></div>
        <div class="stat-item"><div class="number" id="statPeminjaman">-</div><div class="label">📋 Total Peminjaman</div></div>
        <div class="stat-item"><div class="number" id="statMenunggu">-</div><div class="label">⏳ Menunggu Approve</div></div>
    </div>

    <!-- NOTIFICATION -->
    <div id="notification" class="notification"></div>

    <!-- FORM PENGAJUAN -->
    <div class="card">
        <h2>📝 Ajukan Peminjaman</h2>
        <form id="peminjamanForm">
            <div class="form-grid">
                <div class="form-group">
                    <label>Jenis Peminjaman <span class="required">*</span></label>
                    <select id="jenisPeminjaman" required>
                        <option value="">-- Pilih Jenis --</option>
                        <option value="ruang">🏢 Ruang Lab</option>
                        <option value="inventaris">📦 Inventaris</option>
                    </select>
                </div>
                <div class="form-group" id="itemContainer">
                    <label>Pilih Item <span class="required">*</span></label>
                    <select id="itemSelect" required><option value="">-- Pilih Item --</option></select>
                </div>
                <div class="form-group">
                    <label>Nama Peminjam <span class="required">*</span></label>
                    <input type="text" id="namaPeminjam" placeholder="Nama lengkap" required>
                </div>
                <div class="form-group" id="jumlahContainer" style="display:none;">
                    <label>Jumlah <span class="required">*</span></label>
                    <input type="number" id="jumlah" min="1" value="1">
                </div>
                <div class="form-group">
                    <label>Tanggal Pinjam <span class="required">*</span></label>
                    <input type="date" id="tanggalPinjam" required>
                </div>
                <div class="form-group">
                    <label>Tanggal Kembali</label>
                    <input type="date" id="tanggalKembali">
                </div>
                <div class="form-group">
                    <label>Jam Mulai <span class="required">*</span></label>
                    <input type="time" id="jamMulai" required>
                </div>
                <div class="form-group">
                    <label>Jam Selesai <span class="required">*</span></label>
                    <input type="time" id="jamSelesai" required>
                </div>
                <div class="form-group form-full">
                    <label>Keperluan</label>
                    <textarea id="keperluan" placeholder="Contoh: Praktikum, Ujian, Rapat, dll"></textarea>
                </div>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">📤 Ajukan Peminjaman</button>
                <button type="reset" class="btn btn-secondary">↺ Reset</button>
            </div>
        </form>
    </div>

    <!-- DAFTAR PEMINJAMAN -->
    <div class="card">
        <h2>📋 Daftar Peminjaman <span class="badge" id="totalPeminjamanBadge">0</span></h2>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Jenis</th>
                        <th>Item/Ruang</th>
                        <th>Peminjam</th>
                        <th>Jumlah</th>
                        <th>Tgl Pinjam</th>
                        <th>Jam</th>
                        <th>Status</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="peminjamanTableBody">
                    <tr><td colspan="9" class="text-center text-muted">⏳ Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<!-- MODAL ADMIN (untuk approve/reject) -->
<div class="modal-overlay" id="adminModal">
    <div class="modal-box">
        <h2 id="modalTitle">⚙️ Aksi Admin</h2>
        <div id="modalBody"></div>
        <div class="modal-actions">
            <button class="btn btn-success" id="modalApproveBtn">✅ Setujui</button>
            <button class="btn btn-danger" id="modalRejectBtn">❌ Tolak</button>
            <button class="btn btn-secondary" onclick="closeModal()">Tutup</button>
        </div>
    </div>
</div>

<script>
// ============================================================
// KONFIGURASI
// ============================================================
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbywdB9e8cEJesRuDq1tPM3R_4GgVfhi4dvNE-F3HPKE4tfuCq7ltK25iCEkNmGStatmkA/exec";

// ============================================================
// LOADING MODAL
// ============================================================
function showLoading(text = '⏳ Memuat data...', sub = 'Mohon tunggu sebentar', progress = 0) {
    const overlay = document.getElementById('loadingOverlay');
    document.getElementById('loadingText').textContent = text;
    document.getElementById('loadingSub').textContent = sub;
    document.getElementById('loadingProgress').style.width = progress + '%';
    overlay.classList.add('active');
}

function hideLoading() {
    document.getElementById('loadingOverlay').classList.remove('active');
}

function updateLoading(text, sub, progress) {
    document.getElementById('loadingText').textContent = text;
    document.getElementById('loadingSub').textContent = sub;
    document.getElementById('loadingProgress').style.width = progress + '%';
}

// ============================================================
// JSONP HELPER (Built-in)
// ============================================================
function jsonpRequest(url, params = {}, timeout = 30000) {
    return new Promise((resolve, reject) => {
        const callbackName = 'jsonp_callback_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
        const script = document.createElement('script');
        
        const timer = setTimeout(() => {
            cleanup();
            reject(new Error('Request timeout'));
        }, timeout);
        
        function cleanup() {
            clearTimeout(timer);
            delete window[callbackName];
            if (script.parentNode) script.parentNode.removeChild(script);
        }
        
        window[callbackName] = function(data) {
            cleanup();
            resolve(data);
        };
        
        script.onerror = function() {
            cleanup();
            reject(new Error('Network error'));
        };
        
        const urlParams = new URLSearchParams(params);
        urlParams.append('callback', callbackName);
        urlParams.append('_t', Date.now());
        
        script.src = url + '?' + urlParams.toString();
        document.head.appendChild(script);
    });
}

// ============================================================
// API WRAPPER
// ============================================================
const API = {
    call(action, params = {}) {
        return jsonpRequest(SCRIPT_URL, { action, ...params });
    },
    
    getRuang() { return this.call('get_ruang'); },
    getInventaris() { return this.call('get_inventaris'); },
    getPeminjamanRuang() { return this.call('get_peminjaman_ruang'); },
    getPeminjamanInventaris() { return this.call('get_peminjaman_inventaris'); },
    getAllPeminjaman() { return this.call('get_all_peminjaman'); },
    getStats() { return this.call('get_stats'); },
    
    addPeminjamanRuang(data) { return this.call('add_peminjaman_ruang', { data: JSON.stringify(data) }); },
    addPeminjamanInventaris(data) { return this.call('add_peminjaman_inventaris', { data: JSON.stringify(data) }); },
    
    approveRuang(id) { return this.call('approve_ruang', { id }); },
    rejectRuang(id) { return this.call('reject_ruang', { id }); },
    approveInventaris(id) { return this.call('approve_inventaris', { id }); },
    rejectInventaris(id) { return this.call('reject_inventaris', { id }); },
    returnInventaris(id) { return this.call('return_inventaris', { id }); }
};

// ============================================================
// STATE
// ============================================================
let isAdmin = false;
let currentUser = null;
let allData = {
    ruang: [],
    inventaris: [],
    peminjaman: []
};

// ============================================================
// UTILITY
// ============================================================
function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>"]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        if (m === '"') return '&quot;';
        return m;
    });
}

function formatDate(dateStr) {
    if (!dateStr) return '-';
    try {
        const d = new Date(dateStr);
        if (isNaN(d.getTime())) return '-';
        return d.toLocaleDateString('id-ID');
    } catch { return '-'; }
}

function formatTime(timeStr) {
    if (!timeStr) return '-';
    return timeStr.substring(0, 5);
}

function getStatusBadge(status) {
    const map = {
        'pending': ['status-pending', '⏳ Menunggu'],
        'approved': ['status-approved', '✅ Disetujui'],
        'rejected': ['status-rejected', '❌ Ditolak'],
        'returned': ['status-returned', '↩️ Dikembalikan']
    };
    const [cls, label] = map[status] || ['status-pending', status];
    return `<span class="status-badge ${cls}">${label}</span>`;
}

function showNotification(message, type = 'info') {
    const el = document.getElementById('notification');
    el.textContent = message;
    el.className = 'notification ' + type;
    el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 4000);
}

// ============================================================
// LOAD DATA DARI DATABASE (DENGAN LOADING PROGRESS)
// ============================================================
async function loadAllData() {
    showLoading('⏳ Memuat data...', 'Menghubungi server...', 10);
    
    try {
        // Step 1: Load stats
        updateLoading('📊 Memuat statistik...', 'Mengambil data statistik', 25);
        const stats = await API.getStats();
        if (stats.status === 'success') {
            document.getElementById('statRuang').textContent = stats.data.totalRuang || 0;
            document.getElementById('statInventaris').textContent = stats.data.totalInventaris || 0;
            document.getElementById('statPeminjaman').textContent = stats.data.totalPeminjaman || 0;
            document.getElementById('statMenunggu').textContent = stats.data.menungguApprove || 0;
        }
        
        // Step 2: Load peminjaman
        updateLoading('📋 Memuat daftar peminjaman...', 'Mengambil data peminjaman', 50);
        const peminjaman = await API.getAllPeminjaman();
        if (peminjaman.status === 'success') {
            allData.peminjaman = peminjaman.data || [];
            renderPeminjaman();
            document.getElementById('totalPeminjamanBadge').textContent = allData.peminjaman.length;
        }
        
        // Step 3: Load ruang
        updateLoading('🏢 Memuat data ruang...', 'Mengambil data master ruang', 70);
        const ruang = await API.getRuang();
        if (ruang.status === 'success') {
            allData.ruang = ruang.data || [];
            updateItemDropdown('ruang');
        }
        
        // Step 4: Load inventaris
        updateLoading('📦 Memuat data inventaris...', 'Mengambil data master inventaris', 85);
        const inventaris = await API.getInventaris();
        if (inventaris.status === 'success') {
            allData.inventaris = inventaris.data || [];
            updateItemDropdown('inventaris');
        }
        
        // Selesai
        updateLoading('✅ Selesai!', 'Semua data berhasil dimuat', 100);
        setTimeout(hideLoading, 500);
        
    } catch (error) {
        console.error('Error loading data:', error);
        updateLoading('❌ Gagal memuat data', error.message, 100);
        setTimeout(() => {
            hideLoading();
            showNotification('Gagal memuat data: ' + error.message, 'error');
        }, 1500);
    }
}

// ============================================================
// RENDER PEMINJAMAN
// ============================================================
function renderPeminjaman() {
    const tbody = document.getElementById('peminjamanTableBody');
    const data = allData.peminjaman;
    
    if (!data || data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="9" class="text-center text-muted">Belum ada data peminjaman</td></tr>';
        return;
    }
    
    let html = '';
    const displayData = data.slice(0, 20);
    displayData.forEach((item, index) => {
        const isPending = item.status === 'pending';
        const itemName = item.nama_ruang || item.nama_item || '-';
        const jumlah = item.jumlah || '-';
        const jam = item.jam_mulai && item.jam_selesai ? `${formatTime(item.jam_mulai)} - ${formatTime(item.jam_selesai)}` : '-';
        
        html += `<tr>
            <td>${index + 1}</td>
            <td>${item.type === 'Ruang' ? '🏢' : '📦'} ${item.type || '-'}</td>
            <td>${escapeHtml(itemName)}</td>
            <td>${escapeHtml(item.peminjam || '-')}</td>
            <td>${jumlah}</td>
            <td>${formatDate(item.tanggal_pinjam)}</td>
            <td>${jam}</td>
            <td>${getStatusBadge(item.status)}</td>
            <td>
                ${isAdmin && isPending ? `<button class="btn btn-success btn-sm" onclick="openAdminModal(${item.id}, '${item.type}')">⚙️</button>` : ''}
                ${item.status === 'approved' && item.type === 'Inventaris' ? `<button class="btn btn-warning btn-sm" onclick="returnItem(${item.id})">↩️</button>` : ''}
            </td>
        </tr>`;
    });
    tbody.innerHTML = html;
}

// ============================================================
// UPDATE DROPDOWN ITEM
// ============================================================
function updateItemDropdown(type) {
    const select = document.getElementById('itemSelect');
    const data = type === 'ruang' ? allData.ruang : allData.inventaris;
    
    const label = type === 'ruang' ? 'Ruang' : 'Item';
    select.innerHTML = `<option value="">-- Pilih ${label} --</option>`;
    if (data && data.length > 0) {
        data.forEach(item => {
            let text;
            if (type === 'ruang') {
                text = `${item.nama_ruang} (${item.kode || '-'} | Kapasitas: ${item.kapasitas || '-'})`;
            } else {
                const status = item.status_pinjam || 'Tidak Tersedia';
                text = `${item.nama_item} (${item.kategori || '-'} | Stok: ${item.stok_tersedia || 0} | ${status})`;
            }
            select.innerHTML += `<option value="${item.id}">${escapeHtml(text)}</option>`;
        });
    } else {
        select.innerHTML += `<option value="">Tidak ada data</option>`;
    }
}

// ============================================================
// FORM HANDLING
// ============================================================
document.getElementById('jenisPeminjaman').addEventListener('change', function() {
    const type = this.value;
    const jumlahContainer = document.getElementById('jumlahContainer');
    const itemSelect = document.getElementById('itemSelect');
    
    if (type === 'ruang') {
        jumlahContainer.style.display = 'none';
        updateItemDropdown('ruang');
    } else if (type === 'inventaris') {
        jumlahContainer.style.display = 'block';
        updateItemDropdown('inventaris');
    } else {
        jumlahContainer.style.display = 'none';
        itemSelect.innerHTML = '<option value="">-- Pilih Item --</option>';
    }
});

// Set default date dan time
document.getElementById('tanggalPinjam').valueAsDate = new Date();
document.getElementById('jamMulai').value = '08:00';
document.getElementById('jamSelesai').value = '12:00';

document.getElementById('peminjamanForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const jenis = document.getElementById('jenisPeminjaman').value;
    const itemId = document.getElementById('itemSelect').value;
    const peminjam = document.getElementById('namaPeminjam').value.trim();
    const tanggalPinjam = document.getElementById('tanggalPinjam').value;
    const tanggalKembali = document.getElementById('tanggalKembali').value;
    const jamMulai = document.getElementById('jamMulai').value;
    const jamSelesai = document.getElementById('jamSelesai').value;
    const keperluan = document.getElementById('keperluan').value.trim();
    const jumlah = parseInt(document.getElementById('jumlah').value) || 1;
    
    // Validasi
    if (!jenis || !itemId || !peminjam || !tanggalPinjam || !jamMulai || !jamSelesai) {
        showNotification('Harap lengkapi semua field yang wajib', 'error');
        return;
    }
    
    if (jamMulai >= jamSelesai) {
        showNotification('Jam selesai harus lebih dari jam mulai', 'error');
        return;
    }
    
    showLoading('⏳ Menyimpan data...', 'Mengirimkan pengajuan peminjaman', 50);
    
    try {
        let result;
        if (jenis === 'ruang') {
            result = await API.addPeminjamanRuang({
                id_ruang: parseInt(itemId),
                peminjam: peminjam,
                tanggal_pinjam: tanggalPinjam,
                jam_mulai: jamMulai,
                jam_selesai: jamSelesai,
                tanggal_kembali: tanggalKembali || tanggalPinjam,
                keperluan: keperluan
            });
        } else {
            result = await API.addPeminjamanInventaris({
                id_item: parseInt(itemId),
                peminjam: peminjam,
                jumlah: jumlah,
                tanggal_pinjam: tanggalPinjam,
                jam_mulai: jamMulai,
                jam_selesai: jamSelesai,
                tanggal_kembali: tanggalKembali || '',
                keperluan: keperluan
            });
        }
        
        hideLoading();
        
        if (result.status === 'success') {
            showNotification('✅ ' + result.message, 'success');
            this.reset();
            document.getElementById('tanggalPinjam').valueAsDate = new Date();
            document.getElementById('jamMulai').value = '08:00';
            document.getElementById('jamSelesai').value = '12:00';
            document.getElementById('jumlah').value = 1;
            document.getElementById('jenisPeminjaman').value = '';
            document.getElementById('itemSelect').innerHTML = '<option value="">-- Pilih Item --</option>';
            await loadAllData();
        } else {
            showNotification('❌ ' + result.message, 'error');
        }
    } catch (error) {
        hideLoading();
        showNotification('❌ Gagal mengajukan: ' + error.message, 'error');
    }
});

// ============================================================
// ADMIN MODAL
// ============================================================
let modalTarget = { id: null, type: null };

function openAdminModal(id, type) {
    modalTarget = { id, type };
    document.getElementById('modalTitle').textContent = `⚙️ ${type} - ID #${id}`;
    document.getElementById('modalBody').innerHTML = `
        <p>Apakah Anda ingin menyetujui atau menolak peminjaman ini?</p>
        <p style="font-size:0.85rem;color:#6b7a8a;">ID: ${id} | Jenis: ${type}</p>
    `;
    document.getElementById('adminModal').classList.add('active');
}

function closeModal() {
    document.getElementById('adminModal').classList.remove('active');
}

document.getElementById('modalApproveBtn').addEventListener('click', async function() {
    const { id, type } = modalTarget;
    if (!id) return;
    
    showLoading('⏳ Memproses...', 'Menyetujui peminjaman', 50);
    
    try {
        let result;
        if (type === 'Ruang') {
            result = await API.approveRuang(id);
        } else {
            result = await API.approveInventaris(id);
        }
        
        hideLoading();
        if (result.status === 'success') {
            showNotification('✅ ' + result.message, 'success');
            closeModal();
            await loadAllData();
        } else {
            showNotification('❌ ' + result.message, 'error');
        }
    } catch (error) {
        hideLoading();
        showNotification('❌ Error: ' + error.message, 'error');
    }
});

document.getElementById('modalRejectBtn').addEventListener('click', async function() {
    const { id, type } = modalTarget;
    if (!id) return;
    
    if (!confirm('Yakin ingin menolak peminjaman ini?')) return;
    
    showLoading('⏳ Memproses...', 'Menolak peminjaman', 50);
    
    try {
        let result;
        if (type === 'Ruang') {
            result = await API.rejectRuang(id);
        } else {
            result = await API.rejectInventaris(id);
        }
        
        hideLoading();
        if (result.status === 'success') {
            showNotification('✅ ' + result.message, 'success');
            closeModal();
            await loadAllData();
        } else {
            showNotification('❌ ' + result.message, 'error');
        }
    } catch (error) {
        hideLoading();
        showNotification('❌ Error: ' + error.message, 'error');
    }
});

// Fungsi Return Item
async function returnItem(id) {
    if (!confirm('Konfirmasi pengembalian inventaris?')) return;
    
    showLoading('⏳ Memproses...', 'Mengembalikan inventaris', 50);
    
    try {
        const result = await API.returnInventaris(id);
        hideLoading();
        if (result.status === 'success') {
            showNotification('✅ ' + result.message, 'success');
            await loadAllData();
        } else {
            showNotification('❌ ' + result.message, 'error');
        }
    } catch (error) {
        hideLoading();
        showNotification('❌ Error: ' + error.message, 'error');
    }
}

// Close modal on overlay click
document.getElementById('adminModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});

// ============================================================
// LOGIN / LOGOUT
// ============================================================
function checkLoginStatus() {
    const userData = sessionStorage.getItem('user');
    if (userData) {
        try {
            const user = JSON.parse(userData);
            isAdmin = true;
            currentUser = user;
            document.getElementById('userBadge').textContent = '👤 ' + user.name;
            document.getElementById('userBadge').classList.add('show');
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'inline-block';
        } catch (e) {
            console.error('Error parsing user data');
        }
    }
}

function logout() {
    sessionStorage.removeItem('user');
    isAdmin = false;
    currentUser = null;
    document.getElementById('userBadge').classList.remove('show');
    document.getElementById('loginBtn').style.display = 'inline-block';
    document.getElementById('logoutBtn').style.display = 'none';
    showNotification('Anda telah logout', 'info');
    loadAllData();
}

// ============================================================
// INIT
// ============================================================
checkLoginStatus();
loadAllData();

// Auto refresh setiap 30 detik
setInterval(loadAllData, 120000);
</script>
