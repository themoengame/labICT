<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LAB ICT SMAN 1 Malang</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/main.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/main.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #f0f4fa;
            min-height: 100vh;
            padding: 1.2rem;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* TOPBAR */
        .topbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 0.8rem 1.8rem;
            border-radius: 40px;
            box-shadow: 0 4px 12px rgba(0, 20, 40, 0.06);
            margin-bottom: 2rem;
            border: 1px solid #e4ecf5;
        }
        .logo {
            font-size: 1.3rem;
            font-weight: 700;
            color: #0b2b4a;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .logo i {
            color: #2a7de1;
        }
        .logo span {
            color: #1f6d3b;
        }
        .user-role {
            display: flex;
            align-items: center;
            gap: 1.2rem;
        }
        .role-badge {
            background: #e9eff6;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            font-weight: 500;
            color: #1f4e7a;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .role-badge.admin {
            background: #dff0d8;
            color: #1f6d3b;
        }
        .btn-login {
            background: #1a5bb5;
            border: none;
            color: white;
            padding: 0.5rem 1.6rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }
        .btn-login:hover {
            background: #134a94;
            transform: scale(0.97);
        }
        .btn-login.outline {
            background: transparent;
            border: 1px solid #bccfe0;
            color: #1f4e7a;
        }
        .btn-login.outline:hover {
            background: #eef4fb;
        }
        .btn-login.logout {
            background: #b13a3a;
        }
        .btn-login.logout:hover {
            background: #8f2e2e;
        }

        /* STATS */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 1.8rem;
        }
        .stat-card {
            background: white;
            padding: 1rem 1.2rem;
            border-radius: 20px;
            border: 1px solid #eaf0f6;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .stat-card i {
            font-size: 1.8rem;
            color: #2a7de1;
            width: 2.4rem;
            text-align: center;
        }
        .stat-info h4 {
            font-size: 0.75rem;
            color: #4d627a;
            font-weight: 500;
        }
        .stat-info .number {
            font-size: 1.4rem;
            font-weight: 700;
            color: #0b2b4a;
        }

        /* TABS */
        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 0.2rem;
            margin-bottom: 1.8rem;
            border-bottom: 2px solid #dce5ef;
            padding-bottom: 0.2rem;
        }
        .tab-btn {
            background: transparent;
            border: none;
            padding: 0.6rem 1.6rem;
            font-weight: 600;
            font-size: 0.95rem;
            color: #4d627a;
            border-radius: 40px 40px 0 0;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .tab-btn:hover {
            background: #eaf1fb;
            color: #1a4d7a;
        }
        .tab-btn.active {
            background: white;
            color: #1a5bb5;
            box-shadow: 0 -2px 0 #1a5bb5;
        }
        .panel {
            display: none;
            animation: fade 0.25s ease;
        }
        .panel.active {
            display: block;
        }
        @keyframes fade {
            0% {
                opacity: 0.4;
                transform: translateY(6px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* CARDS */
        .card {
            background: white;
            border-radius: 28px;
            padding: 1.5rem 1.8rem 1.8rem;
            box-shadow: 0 6px 20px rgba(0, 20, 40, 0.04);
            border: 1px solid #e4ecf5;
            margin-bottom: 2rem;
        }
        .card-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .card-header h2 {
            font-size: 1.3rem;
            font-weight: 600;
            color: #0b2b4a;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .card-header h2 i {
            color: #2a7de1;
        }
        .btn-primary {
            background: #1a5bb5;
            border: none;
            color: white;
            padding: 0.5rem 1.4rem;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid transparent;
        }
        .btn-primary:hover {
            background: #134a94;
            transform: scale(0.97);
        }
        .btn-primary.green {
            background: #1f8b4d;
        }
        .btn-primary.green:hover {
            background: #16703d;
        }
        .btn-primary.red {
            background: #b13a3a;
        }
        .btn-primary.red:hover {
            background: #8f2e2e;
        }
        .btn-primary.gray {
            background: #6b7f97;
        }
        .btn-primary.gray:hover {
            background: #55677d;
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* TABLES */
        .table-wrap {
            overflow-x: auto;
            border-radius: 16px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        th {
            text-align: left;
            padding: 0.7rem 0.8rem;
            background: #f2f7fd;
            color: #1f3b5c;
            font-weight: 600;
            border-bottom: 2px solid #d7e2f0;
        }
        td {
            padding: 0.7rem 0.8rem;
            border-bottom: 1px solid #e6eef8;
            vertical-align: middle;
        }
        tr:last-child td {
            border-bottom: none;
        }
        .status-badge {
            padding: 0.15rem 1rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            display: inline-block;
        }
        .status-badge.approved {
            background: #dff0d8;
            color: #1f6d3b;
        }
        .status-badge.pending {
            background: #fff3d6;
            color: #a46b1a;
        }
        .status-badge.rejected {
            background: #fde8e8;
            color: #b13a3a;
        }
        .status-badge.done {
            background: #e9edf2;
            color: #4d5c6e;
        }
        .action-icons i {
            margin: 0 3px;
            cursor: pointer;
            transition: 0.15s;
            font-size: 0.95rem;
            padding: 4px;
            border-radius: 50%;
        }
        .action-icons i:hover {
            transform: scale(1.15);
        }
        .action-icons i.fa-check-circle {
            color: #1f8b4d;
        }
        .action-icons i.fa-check-circle:hover {
            background: #dff0d8;
        }
        .action-icons i.fa-times-circle {
            color: #b13a3a;
        }
        .action-icons i.fa-times-circle:hover {
            background: #fde8e8;
        }
        .action-icons i.fa-check-double {
            color: #6b7f97;
        }
        .action-icons i.fa-check-double:hover {
            background: #e9edf2;
        }
        .action-icons i.fa-undo {
            color: #f39c12;
        }
        .action-icons i.fa-undo:hover {
            background: #fff3d6;
        }
        .action-icons i.fa-trash-alt {
            color: #b13a3a;
        }
        .action-icons i.fa-trash-alt:hover {
            background: #fde8e8;
        }
        .action-icons i.fa-edit {
            color: #2a7de1;
        }
        .action-icons i.fa-edit:hover {
            background: #eaf1fb;
        }

        /* FORMS */
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        .form-group label {
            font-weight: 500;
            color: #1f3b5c;
            font-size: 0.85rem;
            margin-bottom: 0.2rem;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 0.6rem 1rem;
            border-radius: 40px;
            border: 1px solid #d0ddee;
            font-size: 0.9rem;
            outline: none;
            transition: 0.2s;
        }
        .form-group textarea {
            border-radius: 16px;
            resize: vertical;
            min-height: 60px;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: #2a7de1;
            box-shadow: 0 0 0 3px rgba(42, 125, 225, 0.15);
        }
        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 0.5rem;
            flex-wrap: wrap;
        }

        /* INVENTARIS & KOMPUTER GRID */
        .item-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 0.5rem;
        }
        .item-card {
            background: #f9fcff;
            border: 1px solid #e4ecf5;
            border-radius: 16px;
            padding: 0.9rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            transition: 0.15s;
            position: relative;
        }
        .item-card:hover {
            background: #f2f8ff;
            border-color: #b8cfe0;
        }
        .item-card i {
            font-size: 1.6rem;
            color: #3d7eb9;
            width: 2.2rem;
            text-align: center;
        }
        .item-card .info {
            flex: 1;
        }
        .item-card .info .nama {
            font-weight: 500;
            color: #0b2b4a;
            font-size: 0.9rem;
        }
        .item-card .info .detail {
            font-size: 0.75rem;
            color: #4d6a89;
        }
        .item-card .item-actions {
            position: absolute;
            top: 4px;
            right: 4px;
            display: none;
        }
        .item-card:hover .item-actions {
            display: block;
        }
        .item-card .item-actions i {
            font-size: 0.8rem;
            color: #6b7f97;
            cursor: pointer;
            padding: 2px 4px;
        }
        .item-card .item-actions i:hover {
            color: #1a5bb5;
        }

        /* KALENDER */
        #calendar {
            max-width: 100%;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 0.5rem;
        }
        .fc .fc-button-primary {
            background: #1a5bb5;
            border-color: #1a5bb5;
        }
        .fc .fc-button-primary:hover {
            background: #134a94;
            border-color: #134a94;
        }
        .fc .fc-daygrid-day.fc-day-today {
            background: #f0f7ff;
        }

        /* MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal-box {
            background: white;
            border-radius: 32px;
            padding: 2.2rem 2.5rem;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            animation: fade 0.25s ease;
        }
        .modal-box h2 {
            font-size: 1.5rem;
            color: #0b2b4a;
            margin-bottom: 0.5rem;
        }
        .modal-box p {
            color: #4d627a;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }
        .modal-box label {
            font-weight: 500;
            color: #1f3b5c;
            display: block;
            margin: 0.8rem 0 0.2rem;
        }
        .modal-box input,
        .modal-box select,
        .modal-box textarea {
            width: 100%;
            padding: 0.7rem 1rem;
            border-radius: 40px;
            border: 1px solid #d0ddee;
            font-size: 0.95rem;
            outline: none;
            transition: 0.2s;
        }
        .modal-box textarea {
            border-radius: 16px;
        }
        .modal-box input:focus,
        .modal-box select:focus,
        .modal-box textarea:focus {
            border-color: #2a7de1;
            box-shadow: 0 0 0 3px rgba(42, 125, 225, 0.15);
        }
        .modal-actions {
            display: flex;
            gap: 0.8rem;
            margin-top: 1.8rem;
            justify-content: flex-end;
        }
        .modal-actions .btn-primary {
            padding: 0.6rem 2rem;
        }
        .modal-actions .btn-outline {
            background: transparent;
            border: 1px solid #bccfe0;
            color: #1f4e7a;
            padding: 0.6rem 1.8rem;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        .modal-actions .btn-outline:hover {
            background: #eef4fb;
        }

        /* ADMIN ONLY */
        .admin-only {
            display: none !important;
        }
        body.admin-mode .admin-only {
            display: inline-flex !important;
        }
        body.admin-mode td.admin-only {
            display: table-cell !important;
        }
        body.admin-mode th.admin-only {
            display: table-cell !important;
        }
        body.admin-mode .admin-only-block {
            display: block !important;
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1a5bb5;
            color: white;
            padding: 1rem 1.8rem;
            border-radius: 40px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            font-weight: 500;
            z-index: 1000;
            display: none;
            animation: fade 0.3s ease;
            max-width: 400px;
        }
        .toast.error {
            background: #b13a3a;
        }
        .toast.success {
            background: #1f8b4d;
        }
        .toast.warning {
            background: #d48c1a;
        }
        .toast.show {
            display: block;
        }

        /* LOADING */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            flex-direction: column;
            gap: 1rem;
        }
        .loading-overlay.show {
            display: flex;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #e4ecf5;
            border-top-color: #1a5bb5;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* RESPONSIVE */
        @media (max-width: 680px) {
            body {
                padding: 0.8rem;
            }
            .topbar {
                padding: 0.6rem 1rem;
                border-radius: 28px;
            }
            .logo {
                font-size: 1rem;
            }
            .tab-btn {
                padding: 0.4rem 1rem;
                font-size: 0.8rem;
            }
            .card {
                padding: 1rem;
