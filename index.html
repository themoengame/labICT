<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAB ICT · SMAN 1 Malang</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; }
        body { background: #eef2f5; min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* Header */
        .header {
            background: white;
            border-radius: 24px;
            padding: 20px 30px;
            margin-bottom: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .header h1 { font-size: 1.4rem; color: #1a2a3a; }
        .header h1 span { color: #2c7da0; }
        .header .right { display: flex; align-items: center; gap: 16px; }
        .btn-login { background: #1a2a3a; color: white; border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-weight: 600; }
        .btn-login:hover { background: #2a3a4a; }
        .btn-logout { background: #e74c3c; color: white; border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-weight: 600; display: none; }
        .btn-logout:hover { background: #c0392b; }
        .user-badge { background: #e8f0fe; padding: 6px 16px; border-radius: 20px; font-size: 0.85rem; color: #1a2a3a; display: none; }
        .user-badge.show { display: inline-block; }
        
        /* Card */
        .card {
            background: white;
            border-radius: 24px;
            padding: 24px 28px;
            margin-bottom: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .card h2 { font-size: 1.2rem; color: #1a2a3a; margin-bottom: 16px; }
        .card h2 .badge { font-size: 0.7rem; background: #e74c3c; color: white; padding: 2px 10px; border-radius: 12px; margin-left: 8px; }
        
        /* Form */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .form-group { display: flex; flex-direction: column; gap: 4px; }
        .form-group label { font-weight: 600; color: #4a5a6a; font-size: 0.85rem; }
        .form-group input, .form-group select, .form-group textarea {
            padding: 10px 14px;
            border: 1.5px solid #dde4ec;
            border-radius: 12px;
            font-size: 0.95rem;
            width: 100%;
        }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #2c7da0; }
        .form-group textarea { resize: vertical; min-height: 60px; }
        .form-full { grid-column: 1 / -1; }
        
        .btn { padding: 10px 28px; border: none; border-radius: 20px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: #2c7da0; color: white; }
        .btn-primary:hover { background: #1a6a8a; transform: translateY(-1px); }
        .btn-success { background: #27ae60; color: white; }
        .btn-success:hover { background: #1e8449; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-danger:hover { background: #c0392b; }
        .btn-warning { background: #f39c12; color: white; }
        .btn-warning:hover { background: #d68910; }
        .btn-sm { padding: 4px 14px; font-size: 0.75rem; }
        .btn-outline { background: transparent; border: 1.5px solid #dde4ec; color: #4a5a6a; }
        .btn-outline:hover { background: #f0f2f5; }
        
        .form-actions { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
        
        /* Table */
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #eef2f5; }
        th { background: #f8fafc; font-weight: 600; color: #4a5a6a; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; }
        td { font-size: 0.9rem; }
        .text-center { text-align: center; }
        .text-muted { color: #8a9aa8; }
        
        .status-badge { padding: 3px 12px; border-radius: 12px; font-size: 0.7rem; font-weight: 600; display: inline-block; }
        .status-pending { background: #fff3e0; color: #e65100; }
        .status-approved { background: #e8f5e9; color: #2e7d32; }
        .status-rejected { background: #ffebee; color: #c62828; }
        .status-returned { background: #e3f2fd; color: #0d47a1; }
        
        .notification { padding: 12px 18px; border-radius: 12px; margin-bottom: 16px; display: none; }
        .notification.success { background: #e8f5e9; color: #2e7d32; display: block; }
        .notification.error { background: #ffebee; color: #c62828; display: block; }
        .notification.info { background: #e3f2fd; color: #0d47a1; display: block; }
        
        /* Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin-bottom: 16px; }
        .stat-item { background: #f8fafc; padding: 16px; border-radius: 16px; text-align: center; }
        .stat-item .number { font-size: 1.8rem; font-weight: 700; color: #1a2a3a; }
        .stat-item .label { font-size: 0.75rem; color: #6b7a8a; }
        
        /* Responsive */
        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .header { flex-direction: column; align-items: stretch; text-align: center; }
            .header .right { justify-content: center; flex-wrap: wrap; }
        }
        
        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: white;
            border-radius: 24px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-box h2 { margin-bottom: 16px; }
        .modal-actions { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
    </style>
</head>
<body>
<div class="container">

    <!-- HEADER -->
    <div class="header">
        <h1>🏫 LAB <span>ICT</span> · SMAN 1 Malang</h1>
        <div class="right">
            <span class="user-badge" id="userBadge">👤 Admin</span>
            <button class="btn-login" id="loginBtn" onclick="window.location.href='login.html'">🔐 Login Admin</button>
            <button class="btn-logout" id="logoutBtn" onclick="logout()">🚪 Logout</button>
        </div>
    </div>

    <!-- STATS -->
    <div class="stats-grid" id="statsContainer">
        <div class="stat-item"><div class="number" id="statRuang">0</div><div class="label">🏢 Ruang</div></div>
        <div class="stat-item"><div class="number" id="statInventaris">0</div><div class="label">📦 Inventaris</div></div>
        <div class="stat-item"><div class="number" id="statPeminjaman">0</div><div class="label">📋 Total Peminjaman</div></div>
        <div class="stat-item"><div class="number" id="statMenunggu">0</div><div class="label">⏳ Menunggu Approve</div></div>
    </div>

    <!-- NOTIFICATION -->
    <div id="notification" class="notification"></div>

    <!-- FORM PENGAJUAN -->
    <div class="card">
        <h2>📝 Ajukan Peminjaman</h2>
        <form id="peminjamanForm">
            <div class="form-grid">
                <div class="form-group">
                    <label>Jenis Peminjaman *</label>
                    <select id="jenisPeminjaman" required>
                        <option value="">-- Pilih Jenis --</option>
                        <option value="ruang">🏢 Ruang Lab</option>
                        <option value="inventaris">📦 Inventaris</option>
                    </select>
                </div>
                <div class="form-group" id="itemContainer">
                    <label>Pilih Item *</label>
                    <select id="itemSelect" required><option value="">-- Pilih Item --</option></select>
                </div>
                <div class="form-group">
                    <label>Nama Peminjam *</label>
                    <input type="text" id="namaPeminjam" placeholder="Nama lengkap" required>
                </div>
                <div class="form-group" id="jumlahContainer" style="display:none;">
                    <label>Jumlah *</label>
                    <input type="number" id="jumlah" min="1" value="1">
                </div>
                <div class="form-group">
                    <label>Tanggal Pinjam *</label>
                    <input type="date" id="tanggalPinjam" required>
                </div>
                <div class="form-group">
                    <label>Tanggal Kembali</label>
                    <input type="date" id="tanggalKembali">
                </div>
                <div class="form-group form-full">
                    <label>Keperluan</label>
                    <textarea id="keperluan" placeholder="Contoh: Praktikum, Ujian, dll"></textarea>
                </div>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">📤 Ajukan Peminjaman</button>
                <button type="reset" class="btn btn-outline">↺ Reset</button>
            </div>
        </form>
    </div>

    <!-- DAFTAR PEMINJAMAN -->
    <div class="card">
        <h2>📋 Daftar Peminjaman <span class="badge" id="totalPeminjamanBadge">0</span></h2>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Jenis</th>
                        <th>Item/Ruang</th>
                        <th>Peminjam</th>
                        <th>Jumlah</th>
                        <th>Tgl Pinjam</th>
                        <th>Status</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="peminjamanTableBody">
                    <tr><td colspan="8" class="text-center text-muted">⏳ Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<!-- MODAL ADMIN -->
<div class="modal-overlay" id="adminModal">
    <div class="modal-box">
        <h2 id="modalTitle">⚙️ Aksi Admin</h2>
        <div id="modalBody"></div>
        <div class="modal-actions">
            <button class="btn btn-success" id="modalApproveBtn">✅ Setujui</button>
            <button class="btn btn-danger" id="modalRejectBtn">❌ Tolak</button>
            <button class="btn btn-outline" onclick="closeModal()">Tutup</button>
        </div>
    </div>
</div>

<script>
// ============================================================
// KONFIGURASI - GANTI DENGAN URL APPS SCRIPT ANDA
// ============================================================
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbywdB9e8cEJesRuDq1tPM3R_4GgVfhi4dvNE-F3HPKE4tfuCq7ltK25iCEkNmGStatmkA/exec";

// ============================================================
// JSONP HELPER - SAMA SEPERTI DI input_produksi.html
// ============================================================
const JSONP = {
    _callbackId: 0,
    _pending: {},
    
    request(url, params = {}, timeout = 30000) {
        return new Promise((resolve, reject) => {
            const callbackName = 'jsonp_callback_' + (++this._callbackId);
            const script = document.createElement('script');
            
            const timer = setTimeout(() => {
                this._cleanup(callbackName);
                reject(new Error('Request timeout after ' + timeout + 'ms'));
            }, timeout);
            
            this._pending[callbackName] = {
                resolve: (data) => {
                    clearTimeout(timer);
                    this._cleanup(callbackName);
                    resolve(data);
                },
                reject: (error) => {
                    clearTimeout(timer);
                    this._cleanup(callbackName);
                    reject(error);
                }
            };
            
            const urlParams = new URLSearchParams(params);
            urlParams.append('callback', callbackName);
            urlParams.append('_t', Date.now());
            
            window[callbackName] = function(data) {
                if (this._pending[callbackName]) {
                    this._pending[callbackName].resolve(data);
                }
            }.bind(this);
            
            script.onerror = function() {
                if (this._pending[callbackName]) {
                    this._pending[callbackName].reject(new Error('Network error or script load failed'));
                }
            }.bind(this);
            
            script.src = url + '?' + urlParams.toString();
            document.head.appendChild(script);
        });
    },
    
    _cleanup(callbackName) {
        delete window[callbackName];
        delete this._pending[callbackName];
        document.querySelectorAll('script[src*="' + callbackName + '"]').forEach(el => el.remove());
    }
};

// ============================================================
// API WRAPPER
// ============================================================
const API = {
    call(action, params = {}) {
        return JSONP.request(SCRIPT_URL, { action, ...params });
    },
    
    // READ
    getRuang() { return this.call('get_ruang'); },
    getInventaris() { return this.call('get_inventaris'); },
    getPeminjamanRuang() { return this.call('get_peminjaman_ruang'); },
    getPeminjamanInventaris() { return this.call('get_peminjaman_inventaris'); },
    getAllPeminjaman() { return this.call('get_all_peminjaman'); },
    getStats() { return this.call('get_stats'); },
    
    // WRITE - Peminjaman
    addPeminjamanRuang(data) { return this.call('add_peminjaman_ruang', { data: JSON.stringify(data) }); },
    addPeminjamanInventaris(data) { return this.call('add_peminjaman_inventaris', { data: JSON.stringify(data) }); },
    
    // WRITE - Admin Approve/Reject
    approveRuang(id) { return this.call('approve_ruang', { id }); },
    rejectRuang(id) { return this.call('reject_ruang', { id }); },
    approveInventaris(id) { return this.call('approve_inventaris', { id }); },
    rejectInventaris(id) { return this.call('reject_inventaris', { id }); },
    returnInventaris(id) { return this.call('return_inventaris', { id }); }
};

// ============================================================
// STATE
// ============================================================
let isAdmin = false;
let currentUser = null;
let allData = {
    ruang: [],
    inventaris: [],
    peminjaman: []
};

// ============================================================
// UTILITY FUNCTIONS
// ============================================================
function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>"]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        if (m === '"') return '&quot;';
        return m;
    });
}

function formatDate(dateStr) {
    if (!dateStr) return '-';
    try {
        const d = new Date(dateStr);
        if (isNaN(d.getTime())) return '-';
        return d.toLocaleDateString('id-ID');
    } catch { return '-'; }
}

function getStatusBadge(status) {
    const map = {
        'pending': ['status-pending', '⏳ Menunggu'],
        'approved': ['status-approved', '✅ Disetujui'],
        'rejected': ['status-rejected', '❌ Ditolak'],
        'returned': ['status-returned', '↩️ Dikembalikan']
    };
    const [cls, label] = map[status] || ['status-pending', status];
    return `<span class="status-badge ${cls}">${label}</span>`;
}

function showNotification(message, type = 'info') {
    const el = document.getElementById('notification');
    el.textContent = message;
    el.className = 'notification ' + type;
    el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 4000);
}

// ============================================================
// LOAD DATA DARI APPS SCRIPT (JSONP)
// ============================================================
async function loadAllData() {
    try {
        console.log('🔄 Memuat data dari Apps Script...');
        
        // 1. Load Stats
        const stats = await API.getStats();
        if (stats.status === 'success') {
            document.getElementById('statRuang').textContent = stats.data.totalRuang || 0;
            document.getElementById('statInventaris').textContent = stats.data.totalInventaris || 0;
            document.getElementById('statPeminjaman').textContent = stats.data.totalPeminjaman || 0;
            document.getElementById('statMenunggu').textContent = stats.data.menungguApprove || 0;
        } else {
            console.warn('Stats error:', stats.message);
        }
        
        // 2. Load All Peminjaman
        const peminjaman = await API.getAllPeminjaman();
        if (peminjaman.status === 'success') {
            allData.peminjaman = peminjaman.data || [];
            renderPeminjaman();
            document.getElementById('totalPeminjamanBadge').textContent = allData.peminjaman.length;
        } else {
            console.warn('Peminjaman error:', peminjaman.message);
        }
        
        // 3. Load Ruang untuk dropdown
        const ruang = await API.getRuang();
        if (ruang.status === 'success') {
            allData.ruang = ruang.data || [];
            updateItemDropdown('ruang');
        } else {
            console.warn('Ruang error:', ruang.message);
        }
        
        // 4. Load Inventaris untuk dropdown
        const inventaris = await API.getInventaris();
        if (inventaris.status === 'success') {
            allData.inventaris = inventaris.data || [];
            updateItemDropdown('inventaris');
        } else {
            console.warn('Inventaris error:', inventaris.message);
        }
        
        console.log('✅ Data berhasil dimuat:', {
            ruang: allData.ruang.length,
            inventaris: allData.inventaris.length,
            peminjaman: allData.peminjaman.length
        });
        
    } catch (error) {
        console.error('❌ Error loading data:', error);
        showNotification('Gagal memuat data: ' + error.message, 'error');
    }
}

// ============================================================
// RENDER PEMINJAMAN KE TABEL
// ============================================================
function renderPeminjaman() {
    const tbody = document.getElementById('peminjamanTableBody');
    const data = allData.peminjaman;
    
    if (!data || data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted">📭 Belum ada data peminjaman</td></tr>';
        return;
    }
    
    let html = '';
    // Tampilkan 20 terakhir
    const displayData = data.slice(0, 20);
    displayData.forEach((item, index) => {
        const isPending = item.Status === 'pending';
        html += `<tr>
            <td>${index + 1}</td>
            <td>${item.type === 'Ruang' ? '🏢 Ruang' : '📦 Inventaris'}</td>
            <td>${escapeHtml(item.NamaRuang || item.NamaItem)}</td>
            <td>${escapeHtml(item.Peminjam)}</td>
            <td>${item.Jumlah || '-'}</td>
            <td>${formatDate(item.TanggalPinjam)}</td>
            <td>${getStatusBadge(item.Status)}</td>
            <td>
                ${isAdmin && isPending ? `<button class="btn btn-success btn-sm" onclick="openAdminModal(${item.ID}, '${item.type}')">⚙️</button>` : '-'}
            </td>
        </tr>`;
    });
    tbody.innerHTML = html;
}

// ============================================================
// UPDATE DROPDOWN ITEM
// ============================================================
function updateItemDropdown(type) {
    const select = document.getElementById('itemSelect');
    const data = type === 'ruang' ? allData.ruang : allData.inventaris;
    
    const label = type === 'ruang' ? 'Ruang' : 'Item';
    select.innerHTML = `<option value="">-- Pilih ${label} --</option>`;
    
    if (data && data.length > 0) {
        data.forEach(item => {
            const text = type === 'ruang' 
                ? `${item.Nama} (Kapasitas: ${item.Kapasitas || '-'})` 
                : `${item.Nama} (Stok: ${item.Stok || 0})`;
            select.innerHTML += `<option value="${item.ID}">${escapeHtml(text)}</option>`;
        });
    } else {
        select.innerHTML += `<option value="">Tidak ada data ${label}</option>`;
    }
}

// ============================================================
// FORM HANDLING
// ============================================================
document.getElementById('jenisPeminjaman').addEventListener('change', function() {
    const type = this.value;
    const jumlahContainer = document.getElementById('jumlahContainer');
    const itemSelect = document.getElementById('itemSelect');
    
    if (type === 'ruang') {
        jumlahContainer.style.display = 'none';
        updateItemDropdown('ruang');
    } else if (type === 'inventaris') {
        jumlahContainer.style.display = 'block';
        updateItemDropdown('inventaris');
    } else {
        jumlahContainer.style.display = 'none';
        itemSelect.innerHTML = '<option value="">-- Pilih Item --</option>';
    }
});

// Set default date
document.getElementById('tanggalPinjam').valueAsDate = new Date();

document.getElementById('peminjamanForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const jenis = document.getElementById('jenisPeminjaman').value;
    const itemId = document.getElementById('itemSelect').value;
    const peminjam = document.getElementById('namaPeminjam').value.trim();
    const tanggalPinjam = document.getElementById('tanggalPinjam').value;
    const tanggalKembali = document.getElementById('tanggalKembali').value;
    const keperluan = document.getElementById('keperluan').value.trim();
    const jumlah = parseInt(document.getElementById('jumlah').value) || 1;
    
    if (!jenis || !itemId || !peminjam || !tanggalPinjam) {
        showNotification('Harap lengkapi semua field yang wajib', 'error');
        return;
    }
    
    try {
        let result;
        if (jenis === 'ruang') {
            result = await API.addPeminjamanRuang({
                IDRuang: parseInt(itemId),
                Peminjam: peminjam,
                TanggalPinjam: tanggalPinjam,
                TanggalKembali: tanggalKembali || tanggalPinjam,
                Keperluan: keperluan
            });
        } else {
            result = await API.addPeminjamanInventaris({
                IDItem: parseInt(itemId),
                Peminjam: peminjam,
                Jumlah: jumlah,
                TanggalPinjam: tanggalPinjam,
                TanggalKembali: tanggalKembali || '',
                Keperluan: keperluan
            });
        }
        
        if (result.status === 'success') {
            showNotification('✅ ' + result.message, 'success');
            this.reset();
            document.getElementById('tanggalPinjam').valueAsDate = new Date();
            document.getElementById('jumlah').value = 1;
            document.getElementById('jenisPeminjaman').value = '';
            document.getElementById('itemSelect').innerHTML = '<option value="">-- Pilih Item --</option>';
            await loadAllData();
        } else {
            showNotification('❌ ' + (result.message || 'Gagal menyimpan'), 'error');
        }
    } catch (error) {
        showNotification('❌ Gagal mengajukan: ' + error.message, 'error');
    }
});

// ============================================================
// ADMIN MODAL (Approve/Reject)
// ============================================================
let modalTarget = { id: null, type: null };

function openAdminModal(id, type) {
    modalTarget = { id, type };
    document.getElementById('modalTitle').textContent = `⚙️ ${type} - ID #${id}`;
    document.getElementById('modalBody').innerHTML = `
        <p>Apakah Anda ingin menyetujui atau menolak peminjaman ini?</p>
        <p style="font-size:0.85rem;color:#6b7a8a;margin-top:8px;">
            ID: ${id} | Jenis: ${type}
        </p>
    `;
    document.getElementById('adminModal').classList.add('active');
}

function closeModal() {
    document.getElementById('adminModal').classList.remove('active');
}

document.getElementById('modalApproveBtn').addEventListener('click', async function() {
    const { id, type } = modalTarget;
    if (!id) return;
    
    try {
        let result;
        if (type === 'Ruang') {
            result = await API.approveRuang(id);
        } else {
            result = await API.approveInventaris(id);
        }
        
        if (result.status === 'success') {
            showNotification('✅ ' + result.message, 'success');
            closeModal();
            await loadAllData();
        } else {
            showNotification('❌ ' + (result.message || 'Gagal approve'), 'error');
        }
    } catch (error) {
        showNotification('❌ Error: ' + error.message, 'error');
    }
});

document.getElementById('modalRejectBtn').addEventListener('click', async function() {
    const { id, type } = modalTarget;
    if (!id) return;
    
    if (!confirm('Yakin ingin menolak peminjaman ini?')) return;
    
    try {
        let result;
        if (type === 'Ruang') {
            result = await API.rejectRuang(id);
        } else {
            result = await API.rejectInventaris(id);
        }
        
        if (result.status === 'success') {
            showNotification('✅ ' + result.message, 'success');
            closeModal();
            await loadAllData();
        } else {
            showNotification('❌ ' + (result.message || 'Gagal reject'), 'error');
        }
    } catch (error) {
        showNotification('❌ Error: ' + error.message, 'error');
    }
});

// Close modal on overlay click
document.getElementById('adminModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});

// ============================================================
// LOGIN / LOGOUT
// ============================================================
function checkLoginStatus() {
    const userData = sessionStorage.getItem('user');
    if (userData) {
        try {
            const user = JSON.parse(userData);
            isAdmin = true;
            currentUser = user;
            document.getElementById('userBadge').textContent = '👤 ' + user.name;
            document.getElementById('userBadge').classList.add('show');
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'inline-block';
            console.log('✅ Admin logged in:', user.name);
        } catch (e) {
            console.error('Error parsing user data:', e);
        }
    } else {
        console.log('ℹ️ Not logged in');
    }
}

function logout() {
    sessionStorage.removeItem('user');
    isAdmin = false;
    currentUser = null;
    document.getElementById('userBadge').classList.remove('show');
    document.getElementById('loginBtn').style.display = 'inline-block';
    document.getElementById('logoutBtn').style.display = 'none';
    showNotification('Anda telah logout', 'info');
    loadAllData();
}

// ============================================================
// INIT - JALANKAN SAAT HALAMAN DIMUAT
// ============================================================
checkLoginStatus();
loadAllData();

// Refresh data setiap 30 detik (seperti di input_produksi)
setInterval(loadAllData, 30000);

console.log('🚀 Aplikasi LAB ICT siap digunakan');
console.log('📡 API URL:', SCRIPT_URL);
console.log('👤 Admin mode:', isAdmin);
</script>
